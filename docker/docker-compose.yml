version: '3.8'

services:
  airsonic-sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: airsonic-playlist-sync:latest
    container_name: airsonic-playlist-sync
    
    # Mount config directory
    volumes:
      - ../config.json:/config/config.json:ro
      - ../logs:/app/logs
    
    # Set timezone
    environment:
      - TZ=America/New_York
    
    # Restart policy
    restart: unless-stopped
    
    # Run once and exit (for cron-based scheduling)
    # Remove this line if you want the container to keep running
    command: python3 /app/sync_playlist.py --config /config/config.json

