version: '3.8'

services:
  airsonic-sync:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: airsonic-playlist-sync:latest
    container_name: airsonic-playlist-sync-scheduled
    
    # Mount config directory
    volumes:
      - ../config.json:/config/config.json:ro
      - ../logs:/app/logs
    
    # Set timezone and sync interval
    environment:
      - TZ=America/New_York
      - SYNC_INTERVAL=3600  # Sync every hour (in seconds)
    
    # Restart policy
    restart: unless-stopped
    
    # Keep container running and sync periodically
    command: >
      sh -c "while true; do
        echo '[$(date)] Starting sync...';
        python3 /app/sync_playlist.py --config /config/config.json;
        echo '[$(date)] Sync complete. Waiting $${SYNC_INTERVAL:-3600} seconds...';
        sleep $${SYNC_INTERVAL:-3600};
      done"
